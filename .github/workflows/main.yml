name: ACEest CI
on: [push, pull_request]
# This enables manual triggering from the Actions tab
  workflow_dispatch:
    inputs:
      environment:
        description: 'Choose environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      run-tests:
        description: 'Run tests before deployment?'
        required: false
        default: 'true'
        type: boolean
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - run: pip install -r requirements.txt
    - run: pytest
    - run: docker build -t aceest-fitness .

  trigger-jenkins:
    runs-on: self-hosted
    steps: 
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Trigger Jenkins Job
      uses: appleboy/jenkins-action@v1
      with:
        url: ${{secrets.JENKINS_URL}}
        user: "cloud"
        token: ${{ secrets.JENKINS_TOKEN }}
        job: "ACEest-CI_CD_pipeline1"
        wait: true # Optional: Wait for the result  
